
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROADMAP ОТ ВЛАДА</title>
<style>
body{margin:0;background:#050505;color:#fff;font-family:Arial,sans-serif}
.hero{padding:40px 20px;text-align:center}
h1{font-size:48px;margin:0}
.green{color:#A3FF12}
.btn{background:#A3FF12;color:#000;padding:15px 25px;border:none;border-radius:12px;font-weight:bold}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.card{background:#0B0B0B;border:1px solid #1A1A1A;border-radius:16px;padding:20px;cursor:pointer}
.card:hover{border-color:#A3FF12}
.num{width:42px;height:42px;border-radius:50%;border:2px solid #A3FF12;color:#A3FF12;display:flex;align-items:center;justify-content:center;font-weight:bold}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);padding:20px}
.modal-content{background:#111;border-radius:16px;padding:20px;max-width:700px;margin:40px auto}
.close{float:right;color:#A3FF12;cursor:pointer;font-size:24px}
.check{margin:10px 0}
</style>
</head>
<body>
<div class="hero">
<h1>ROADMAP <span class="green">ОТ ВЛАДА</span></h1>
<p>От 0 до первых $1000 на любой услуге</p>
<button class="btn" onclick="document.getElementById('roadmap').scrollIntoView()">НАЧАТЬ</button>
</div>

<div class="container" id="roadmap">
<div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✕</span>
<h2 id="title"></h2>
<div id="content"></div>
</div>
</div>

<script>
const steps=[
["Выбор ниши",["Найти 10 конкурентов","Проверить спрос","Выбрать нишу"]],
["Освоение навыка",["100 часов практики","Изучить основы","Сделать задания"]],
["Портфолио",["3 проекта","Оформить кейсы","Добавить результаты"]],
["Оффер",["Позиционирование","Цены","Презентация"]],
["Поиск клиентов",["50 сообщений в день","База контактов","Соцсети"]],
["Созвоны",["1-2 созвона","Диагностика","Презентация"]],
["Первый клиент",["Получить отзыв","Сдать работу","Кейс"]],
["Первые $1000",["10x100","5x200","2x500"]],
["Масштабирование",["Поднять чек","Система продаж","Делегирование"]]
];
const grid=document.getElementById('grid');
steps.forEach((s,i)=>{
 const d=document.createElement('div');
 d.className='card';
 d.innerHTML=`<div class=num>${i+1}</div><h3>${s[0]}</h3>`;
 d.onclick=()=>openModal(s);
 grid.appendChild(d);
});
function openModal(s){
 document.getElementById('title').innerText=s[0];
 document.getElementById('content').innerHTML=s[1].map(x=>`<div class="check">☐ ${x}</div>`).join('')+
 '<br><button class="btn">Завершить этап</button>';
 document.getElementById('modal').style.display='block';
}
function closeModal(){document.getElementById('modal').style.display='none';}
</script>
</body>
</html>
