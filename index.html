
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROADMAP ОТ ВЛАДА</title>
<style>
:root{
--bg:#050505;--card:#0c0c0c;--line:#1f1f1f;--green:#A3FF12;--text:#fff;
}
*{box-sizing:border-box}
body{
margin:0;background:radial-gradient(circle at top,#111,#050505 40%);
font-family:Inter,Arial,sans-serif;color:var(--text);
}
.hero{
min-height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;padding:24px;
}
.hero h1{font-size:clamp(42px,8vw,92px);margin:0}
.hero p{opacity:.8;max-width:600px}
.btn{
background:var(--green);color:#000;border:none;border-radius:16px;
padding:16px 28px;font-weight:700;font-size:18px;cursor:pointer;
box-shadow:0 0 30px rgba(163,255,18,.3);
}
.wrap{max-width:1200px;margin:auto;padding:30px}
.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;
}
.card{
background:linear-gradient(180deg,#111,#0b0b0b);
border:1px solid var(--line);
border-radius:24px;padding:22px;cursor:pointer;
transition:.25s;
}
.card:hover{transform:translateY(-4px);border-color:var(--green)}
.num{
width:56px;height:56px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
border:2px solid var(--green);color:var(--green);font-weight:800;
}
.card h3{margin:18px 0 0}
.progress{
height:10px;background:#1a1a1a;border-radius:20px;overflow:hidden;margin:20px 0;
}
.bar{height:100%;width:11%;background:var(--green)}
.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
padding:20px;overflow:auto;
}
.box{
max-width:700px;margin:60px auto;background:#101010;
border:1px solid #222;border-radius:24px;padding:24px;
}
.close{float:right;font-size:28px;color:var(--green);cursor:pointer}
.check{padding:12px 0;border-bottom:1px solid #1b1b1b}
.check input{transform:scale(1.3);margin-right:10px;accent-color:#A3FF12;}
</style>
</head>
<body>

<section class="hero">
<h1>ROADMAP <span style="color:#A3FF12">ОТ ВЛАДА</span></h1>
<p>От нуля до первых $1000. Интерактивная карта действий с мобильной адаптацией.</p>
<button class="btn" onclick="document.getElementById('roadmap').scrollIntoView({behavior:'smooth'})">НАЧАТЬ</button>
</section>

<div class="wrap" id="roadmap">
<h2>Твой прогресс</h2>
<div class="progress"><div class="bar"></div></div>

<div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
<div class="box">
<span class="close" onclick="modal.style.display='none'">×</span>
<h2 id="t"></h2>
<div id="c"></div>
</div>
</div>


<script>
const data=[
["Выбор ниши",["Найти 10 конкурентов","Проверить спрос","Выбрать нишу"]],
["Навык",["100 часов практики","3 тестовых проекта","1 кейс"]],
["Портфолио",["Оформить работы","Добавить результаты","Сделать кейсы"]],
["Оффер",["Сформировать предложение","Определить цену","Подготовить описание"]],
["Клиенты",["50 сообщений в день","1 пост","5 комментариев"]],
["Созвоны",["Провести диагностику","Выявить потребности","Сделать предложение"]],
["Первый клиент",["Получить оплату","Сдать работу","Взять отзыв"]],
["Первые $1000",["10×100","5×200","2×500"]],
["Масштабирование",["Поднять чек","Автоматизация","Система продаж"]]
];

const grid=document.getElementById('grid');
const bar=document.querySelector('.bar');

function updateProgress(){
 let completed=JSON.parse(localStorage.getItem('completed')||'[]');
 bar.style.width=((completed.length/data.length)*100)+'%';
}

function renderCards(){
 grid.innerHTML='';
 let completed=JSON.parse(localStorage.getItem('completed')||'[]');

 data.forEach((s,i)=>{
   let card=document.createElement('div');
   card.className='card';
   if(completed.includes(i)){
      card.style.borderColor='#A3FF12';
      card.style.boxShadow='0 0 20px rgba(163,255,18,.3)';
   }
   card.innerHTML=`<div class="num">${completed.includes(i)?'✓':i+1}</div><h3>${s[0]}</h3>`;
   card.onclick=()=>openStep(i);
   grid.appendChild(card);
 });
 updateProgress();
}

function saveTask(step,task,checked){
 let saved=JSON.parse(localStorage.getItem('step_'+step)||'[]');
 if(checked){ if(!saved.includes(task)) saved.push(task); }
 else { saved=saved.filter(x=>x!==task); }
 localStorage.setItem('step_'+step,JSON.stringify(saved));
}

function openStep(index){
 let step=data[index];
 t.innerText=step[0];
 let saved=JSON.parse(localStorage.getItem('step_'+index)||'[]');

 let html='';
 step[1].forEach((task,i)=>{
 html += `<div class="check"><label><input type="checkbox" ${saved.includes(i)?'checked':''}
 onchange="saveTask(${index},${i},this.checked)"> ${task}</label></div>`;
 });

 html += `<br><button class="btn" onclick="completeStep(${index})">Завершить этап</button>`;
 c.innerHTML=html;
 modal.style.display='block';
}

function completeStep(index){
 let completed=JSON.parse(localStorage.getItem('completed')||'[]');
 if(!completed.includes(index)) completed.push(index);
 localStorage.setItem('completed',JSON.stringify(completed));
 modal.style.display='none';
 renderCards();

 let next=index+1;
 if(next<data.length){
   setTimeout(()=>openStep(next),500);
 } else {
   alert('🎉 Ты прошёл весь ROADMAP!');
 }
}

renderCards();
</script>


</body>
</html>
